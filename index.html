<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Matcher</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 10px; }
        #video-container { display: none; width: 100vw; height: 100vh; position: relative; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; bottom: 20px; right: 20px; width: 30%; border: 2px solid white; border-radius: 8px; z-index: 10; }
        button { padding: 12px 24px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; }
        input, select { padding: 10px; width: 200px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Enter Details</h2>
        <select id="sex"><option value="male">Male</option><option value="female">Female</option></select>
        <input type="number" id="age" placeholder="Your Age">
        <input type="text" id="city" placeholder="City (For display)">
        <button onclick="startApp()">Start Matching</button>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div style="position: absolute; bottom: 20px; left: 20px;">
            <button onclick="location.reload()">Next/Skip</button>
        </div>
    </div>

    <script>
        const socket = io();
        let localStream;
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function startApp() {
            const sex = document.getElementById('sex').value;
            const age = parseInt(document.getElementById('age').value);
            
            // Get Geolocation
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                // Switch UI
                document.getElementById('setup').style.display = 'none';
                document.getElementById('video-container').style.display = 'block';

                // Get Media
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;

                // Join Matching Queue
                socket.emit('join', { 
                    sex, age, lat: latitude, lon: longitude, 
                    distancePref: 100, agePref: 10 
                });
            });
        }

        socket.on('matched', async (data) => {
            peerConnection = new RTCPeerConnection(config);
            
            // Add tracks to connection
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Receive remote stream
            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', { to: data.peerId, signal: { candidate: event.candidate } });
                }
            };

            if (data.offer) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('signal', { to: data.peerId, signal: { sdp: offer } });
            }
        });

        socket.on('signal', async (data) => {
            if (data.signal.sdp) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                if (data.signal.sdp.type === 'offer') {
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.emit('signal', { to: data.from, signal: { sdp: answer } });
                }
            } else if (data.signal.candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });
    </script>
</body>
</html>
